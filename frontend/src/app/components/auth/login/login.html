<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    @if (error) {
    <div class="alert alert--error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input formControlName="username" type="text" autocomplete="username"
               class="form-input" placeholder="Enter username" />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input formControlName="password" type="password" autocomplete="current-password"
               class="form-input" placeholder="Enter password" />
      </div>
      <button type="submit" [disabled]="loading" class="btn-primary btn-full">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-links">
      <a routerLink="/forgot-password" class="link">Forgot password?</a>
      <span>Don't have an account? <a routerLink="/register" class="link">Register</a></span>
    </div>
  </div>
</div>
