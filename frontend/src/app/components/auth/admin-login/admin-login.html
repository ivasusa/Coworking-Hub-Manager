<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-icon-wrapper">
      <div class="admin-login-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h1 class="admin-login-title">Admin Access</h1>
      <p class="admin-login-subtitle">Restricted area</p>
    </div>

    @if (error) {
    <div class="admin-alert">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="admin-label">Username</label>
        <input formControlName="username" type="text" autocomplete="username"
               class="admin-input" placeholder="Admin username" />
      </div>
      <div class="form-group">
        <label class="admin-label">Password</label>
        <input formControlName="password" type="password" autocomplete="current-password"
               class="admin-input" placeholder="Password" />
      </div>

      <button type="submit" [disabled]="loading" class="admin-btn">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
  </div>
</div>
