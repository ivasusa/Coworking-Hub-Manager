<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Forgot password?</h1>
    <p class="auth-subtitle">Enter your username or email and we'll send you a reset link.</p>

    @if (message) {
    <div class="alert alert--success">
      {{ message }}
      @if (resetLink) {
      <div class="reset-link-box">
        <p class="reset-link-label">Линк за ресетовање лозинке:</p>
        <a [href]="resetLink" class="link reset-link">{{ resetLink }}</a>
      </div>
      }
    </div>
    }
    @if (error) {
    <div class="alert alert--error">{{ error }}</div>
    }

    @if (!message) {
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input formControlName="identifier" type="text"
               class="form-input" placeholder="Enter username or email" />
      </div>
      <button type="submit" [disabled]="loading" class="btn-primary btn-full">
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>
    }

    <div class="auth-links">
      <a routerLink="/login" class="link">Back to login</a>
    </div>
  </div>
</div>
